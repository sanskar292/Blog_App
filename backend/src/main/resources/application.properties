spring.application.name=some

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/your_db_name}
spring.datasource.username=${DB_USERNAME:your_pg_username}
spring.datasource.password=${DB_PASSWORD:your_pg_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT secret — set JWT_SECRET env var on Render (must be at least 32 chars for HS256)
jwt.secret=${JWT_SECRET:my-default-local-dev-secret-key-32chars}